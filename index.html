<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doação PIX - Causa Única</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Ajude Nossa Causa</h1>
        <p class="text-gray-500 mb-6 text-sm">Escolha o valor da sua contribuição via PIX</p>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="definirValor(10)" class="border-2 border-green-500 py-3 rounded-xl font-bold text-green-600 hover:bg-green-50 transition">R$ 10</button>
            <button onclick="definirValor(50)" class="border-2 border-green-500 py-3 rounded-xl font-bold text-green-600 hover:bg-green-50 transition">R$ 50</button>
        </div>

        <input type="number" id="valorInput" placeholder="Outro valor (R$)" 
               class="w-full p-4 border rounded-xl mb-6 text-center outline-none focus:ring-2 focus:ring-green-400">

        <button onclick="solicitarPix()" id="btnGerar"
                class="w-full bg-green-500 text-white font-black py-4 rounded-xl shadow-lg hover:bg-green-600 transition uppercase">
            Gerar PIX
        </button>

        <div id="resultado" class="hidden mt-8 p-4 bg-gray-100 rounded-2xl border-dashed border-2 border-gray-300">
            <p class="text-xs text-gray-400 mb-2">Pague com o código abaixo:</p>
            <p id="codigoPix" class="text-[10px] break-all font-mono bg-white p-2 border mb-3">00020126... (Gerando...)</p>
            <button onclick="copiar()" class="text-blue-600 font-bold text-sm underline">Copiar Código PIX</button>
        </div>
    </div>

    <script>
        function definirValor(v) {
            document.getElementById('valorInput').value = v;
        }

        function solicitarPix() {
            const valor = document.getElementById('valorInput').value;
            if(!valor || valor <= 0) return alert("Por favor, insira um valor.");
            
            document.getElementById('btnGerar').innerText = "Processando...";
            // Por enquanto é um simulador. No próximo passo conectamos a Dominipay.
            setTimeout(() => {
                document.getElementById('resultado').classList.remove('hidden');
                document.getElementById('btnGerar').innerText = "Gerar Novo PIX";
            }, 1000);
        }

        function copiar() {
            const texto = document.getElementById('codigoPix').innerText;
            navigator.clipboard.writeText(texto);
            alert("Copiado! Agora cole no app do seu banco.");
        }
    </script>
</body>
</html>
